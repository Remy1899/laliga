<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прогноз Ла Лиги 2024/25 - Сохрани в PNG</title>
    <!-- Подключаем библиотеку html2canvas для сохранения в PNG -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff4b44 0%, #ffffff 50%, #d9403a 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Декоративные элементы в стиле Ла Лиги */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,215,0,0.05) 0%, transparent 80%);
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: #ff4b44;
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.4);
        }

        /* Шапка с логотипом */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-section {
            flex: 1;
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: normal;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .sub {
            color: #000000;
            margin: 5px 0 0 0;
            font-size: 0.85rem;
        }

        /* Контейнер для логотипа - сюда вставишь своё изображение */
        .logo-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 10px 20px;
            border: 2px solid #FFD700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .logo-container:hover {
            transform: scale(1.02);
        }

        .logo-placeholder {
            text-align: center;
        }

        .logo-img {
            max-height: 70px;
            width: auto;
            display: block;
        }

        /* Подсказка для замены логотипа */
        .logo-hint {
            font-size: 0.7rem;
            color: #FFD700;
            text-align: center;
            margin-top: 5px;
            font-style: italic;
        }

        /* Таблица для прогноза (именно её будем сохранять в PNG) */
        .prediction-table {
            background: linear-gradient(to bottom, #fef9e6 0%, #fff5e0 100%);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 2px solid #FFD700;
        }

        .table-header {
            display: grid;
            grid-template-columns: 70px 1fr 60px;
            background: linear-gradient(135deg, #ff4b44 0%, #d9403a 100%);
            color: #ffffff;
            padding: 15px 20px;
            font-weight: bold;
            border-bottom: 3px solid #FFD700;
            font-size: 1.1rem;
            font-family: monospace;
        }

        .header-pos { text-align: center; }
        .header-team { padding-left: 15px; }
        .header-move { text-align: center; }

        .teams-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .team-item {
            background: white;
            margin: 0;
            padding: 12px 20px;
            border-bottom: 1px solid #e6d5b3;
            display: grid;
            grid-template-columns: 70px 1fr 60px;
            align-items: center;
            cursor: grab;
            transition: all 0.15s ease;
        }

        .team-item:hover {
            background: #fff8ed;
            transform: translateX(3px);
        }

        .team-item:active {
            cursor: grabbing;
        }

        .team-item.dragging {
            opacity: 0.3;
            cursor: grabbing;
        }

        .drag-over {
            border-top: 4px solid #FFD700;
            background: #fff3df;
        }

        .team-position {
            font-weight: 800;
            font-size: 1.4rem;
            text-align: center;
            color: #C49A2B;
            font-family: monospace;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.05);
        }

        .team-name {
            font-weight: 600;
            font-size: 1rem;
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-badge {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,215,0,0.5);
        }

        .drag-handle {
            text-align: center;
            color: #C49A2B;
            font-size: 1.8rem;
            cursor: grab;
            transition: 0.1s;
            font-weight: bold;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        /* Кнопки */
        .buttons-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            color: #1B2F4F;
            box-shadow: 0 5px 0 #B57C1C;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B57C1C;
        }

        .reset-btn {
            background: linear-gradient(135deg, #e9c46a 0%, #d4a373 100%);
            color: #2c3e50;
        }

        .save-png-btn {
            background: linear-gradient(135deg, #2a9d8f 0%, #1e6b60 100%);
            color: white;
            box-shadow: 0 5px 0 #145c52;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 10px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #FFD966;
            border: 1px solid #FFD700;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #8aa3c9;
        }

        @media (max-width: 600px) {
            .team-name {
                font-size: 0.8rem;
                padding-left: 5px;
            }
            .team-position {
                font-size: 1.1rem;
            }
            .table-header {
                font-size: 0.85rem;
                grid-template-columns: 55px 1fr 50px;
                padding: 10px;
            }
            .team-item {
                grid-template-columns: 55px 1fr 50px;
                padding: 8px 10px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .logo-img {
                max-height: 50px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title-section">
            <h1>⚡ LA LIGA PREDICTOR 2026/27 ⚡</h1>
            <div class="sub">Сделай свой прогноз финальной таблицы — сохрани результат в PNG</div>
        </div>
        <div class="logo-container" id="logoContainer">
            <div class="logo-placeholder">
                
                <img src="laliga.png" alt="La Liga Logo" class="logo-img">
               
            </div>
        </div>
    </div>

    <!-- Эта таблица будет сохраняться в PNG -->
    <div id="tableToCapture" class="prediction-table">
        <div class="table-header">
            <div class="header-pos">#</div>
            <div class="header-team">КОМАНДА</div>
        </div>
        <div id="teamsContainer">
            <ul id="teamsList" class="teams-list"></ul>
        </div>
    </div>

    <div class="buttons-panel">
        <button class="reset-btn" id="resetBtn">⟳ Сбросить (реальный порядок)</button>
        <button class="save-png-btn" id="savePngBtn">📸 Сохранить таблицу как PNG</button>
    </div>
    <div id="statusMessage" class="status">✨ Перетаскивай команды за ⋮⋮, потом нажми «Сохранить как PNG» ✨</div>
    <footer>🏆 Официальная цветовая гамма Ла Лиги | Твой прогноз — твоя картинка</footer>
</div>

<script>
    // 20 команд Ла Лиги 2024/25
    const TEAMS_DATA = [
        "Реал Мадрид", "Барселона", "Атлетико Мадрид", "Атлетик Бильбао",
        "Реал Сосьедад", "Жирона", "Вильярреал", "Реал Бетис", "Севилья",
        "Осасуна", "Сельта", "Валенсия", "Хетафе", "Райо Вальекано",
        "Лас-Пальмас", "Алавес", "Эспаньол", "Леганес", "Вальядолид", "Мальорка"
    ];

    let currentOrder = [...TEAMS_DATA];
    let draggedItem = null;
    let draggedIndex = null;

    // Цвета для бейджиков (фирменные цвета клубов)
    function getTeamColor(team) {
        const colors = {
            "Реал Мадрид": "#FFFFFF", "Барселона": "#A50044", "Атлетико Мадрид": "#E32636",
            "Атлетик Бильбао": "#E11A2C", "Реал Сосьедад": "#1F4FA1", "Жирона": "#E0342B",
            "Вильярреал": "#FFD700", "Реал Бетис": "#1E7B3E", "Севилья": "#B8122F",
            "Осасуна": "#C60B1E", "Сельта": "#A3D1E6", "Валенсия": "#FF8C00",
            "Хетафе": "#0A7BBA", "Райо Вальекано": "#E01F29", "Лас-Пальмас": "#FFB81C",
            "Алавес": "#0055A4", "Эспаньол": "#2550A5", "Леганес": "#1A472A",
            "Вальядолид": "#720E11", "Мальорка": "#ED1C24"
        };
        return colors[team] || "#6B4E3A";
    }

    function renderList() {
        const container = document.getElementById('teamsList');
        if (!container) return;
        container.innerHTML = '';
        
        currentOrder.forEach((teamName, idx) => {
            const position = idx + 1;
            const li = document.createElement('li');
            li.className = 'team-item';
            li.setAttribute('draggable', 'true');
            li.setAttribute('data-index', idx);
            li.setAttribute('data-team', teamName);
            
            li.innerHTML = `
                <div class="team-position">${position}</div>
                <div class="team-name">
                    <span class="team-badge" style="background: ${getTeamColor(teamName)}; border: 1px solid #FFD700;"></span>
                    ${teamName}
                </div>
                <div class="drag-handle">⋮⋮</div>
            `;
            
            li.addEventListener('dragstart', handleDragStart);
            li.addEventListener('dragover', handleDragOver);
            li.addEventListener('dragleave', handleDragLeave);
            li.addEventListener('drop', handleDrop);
            li.addEventListener('dragend', handleDragEnd);
            
            container.appendChild(li);
        });
    }

    function handleDragStart(e) {
        const li = e.target.closest('.team-item');
        if (!li) { e.preventDefault(); return false; }
        draggedItem = li;
        draggedIndex = parseInt(li.getAttribute('data-index'));
        e.dataTransfer.setData('text/plain', draggedIndex.toString());
        e.dataTransfer.effectAllowed = 'move';
        li.classList.add('dragging');
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const targetLi = e.target.closest('.team-item');
        if (!targetLi || targetLi === draggedItem) return;
        document.querySelectorAll('.team-item').forEach(item => item.classList.remove('drag-over'));
        targetLi.classList.add('drag-over');
    }

    function handleDragLeave(e) {
        const targetLi = e.target.closest('.team-item');
        if (targetLi) targetLi.classList.remove('drag-over');
    }

    function handleDrop(e) {
        e.preventDefault();
        const targetLi = e.target.closest('.team-item');
        if (!targetLi || !draggedItem) { cleanupDrag(); return; }
        targetLi.classList.remove('drag-over');
        const targetIndex = parseInt(targetLi.getAttribute('data-index'));
        if (isNaN(targetIndex) || isNaN(draggedIndex) || draggedIndex === targetIndex) {
            cleanupDrag();
            return;
        }
        
        const newOrder = [...currentOrder];
        const [movedTeam] = newOrder.splice(draggedIndex, 1);
        newOrder.splice(targetIndex, 0, movedTeam);
        currentOrder = newOrder;
        renderList();
        
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = `✅ "${movedTeam}" на ${targetIndex+1} место! Теперь сохрани в PNG.`;
        setTimeout(() => {
            if (statusDiv.innerHTML.includes("PNG")) 
                statusDiv.innerHTML = '✨ Готово! Жми на камеру, чтобы сохранить прогноз ✨';
        }, 2500);
        cleanupDrag();
    }

    function handleDragEnd(e) { cleanupDrag(); }
    
    function cleanupDrag() {
        if (draggedItem) draggedItem.classList.remove('dragging');
        document.querySelectorAll('.team-item').forEach(item => item.classList.remove('drag-over'));
        draggedItem = null;
        draggedIndex = null;
    }

    function resetToRealOrder() {
        currentOrder = [...TEAMS_DATA];
        renderList();
        document.getElementById('statusMessage').innerHTML = '🔄 Сброшено к реальному порядку. Делай прогноз!';
        setTimeout(() => {
            document.getElementById('statusMessage').innerHTML = '✨ Перетаскивай команды и сохраняй в PNG ✨';
        }, 2000);
    }

    // СОХРАНЕНИЕ В PNG через html2canvas
    async function saveTableAsPNG() {
        const element = document.getElementById('tableToCapture');
        if (!element) return;
        
        // Показываем статус загрузки
        const statusDiv = document.getElementById('statusMessage');
        const originalText = statusDiv.innerHTML;
        statusDiv.innerHTML = '⏳ Создаём PNG... Подожди секунду ⏳';
        statusDiv.style.opacity = '0.7';
        
        try {
            // Делаем скриншот с улучшенным качеством
            const canvas = await html2canvas(element, {
                scale: 2.5,          // высокое разрешение
                backgroundColor: '#fef9e6',
                logging: false,
                useCORS: true,       // если используешь внешний лого
                allowTaint: false
            });
            
            // Создаём ссылку для скачивания
            const link = document.createElement('a');
            const date = new Date();
            const fileName = `laliga_predict_${date.getFullYear()}_${date.getMonth()+1}_${date.getDate()}.png`;
            link.download = fileName;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            statusDiv.innerHTML = '✅ PNG сохранён! Проверь папку "Загрузки" ✅';
            statusDiv.style.opacity = '1';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes("PNG сохранён"))
                    statusDiv.innerHTML = originalText;
            }, 3000);
        } catch (error) {
            console.error('Ошибка сохранения PNG:', error);
            statusDiv.innerHTML = '❌ Ошибка при создании PNG. Попробуй ещё раз ❌';
            statusDiv.style.opacity = '1';
        }
    }

    // Загрузка сохранённого прогноза из localStorage
    function loadSavedPrediction() {
        const saved = localStorage.getItem('laliga_my_prediction');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.standings && parsed.standings.length === 20) {
                    currentOrder = parsed.standings;
                    renderList();
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    // Автосохранение при каждом перемещении
    function autoSaveToLocal() {
        const prediction = {
            date: new Date().toISOString(),
            standings: currentOrder
        };
        localStorage.setItem('laliga_my_prediction', JSON.stringify(prediction));
    }

    // Переопределяем renderList, чтобы добавить автосохранение
    const originalRender = renderList;
    window.renderList = function() {
        originalRender();
        autoSaveToLocal();
    };
    renderList = function() {
        originalRender();
        autoSaveToLocal();
    };
    
    // Инициализация
    function init() {
        if (!loadSavedPrediction()) {
            currentOrder = [...TEAMS_DATA];
            renderList();
        } else {
            renderList();
        }
        
        document.getElementById('resetBtn').addEventListener('click', resetToRealOrder);
        document.getElementById('savePngBtn').addEventListener('click', saveTableAsPNG);
        
        // Предотвращаем стандартное поведение браузера
        window.addEventListener('dragstart', (e) => {
            if (!e.target.closest('.team-item')) {
                e.preventDefault();
            }
        });
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
