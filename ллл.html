<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прогноз Ла Лиги 2026/27 - Сохрани в PNG</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff4b44 0%, #ffffff 50%, #d9403a 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,215,0,0.05) 0%, transparent 80%);
            pointer-events: none;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.4);
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Левый блок - только логотип Ла Лиги */
        .logo-laliga {
            flex-shrink: 0;
        }

        /* Правый блок - лого канала + кнопка Telegram вместе */
        .tg-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* Общий стиль для контейнеров логотипов */
        .logo-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 6px 14px;
            border: 2px solid #FFD700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            text-align: center;
        }

        .logo-container:hover {
            transform: scale(1.02);
        }

        /* Кликабельный логотип (Telegram канал) */
        .logo-link {
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
        }

        .logo-img {
            max-height: 50px;
            width: auto;
            display: block;
        }

        .logo-error {
            display: none;
            font-size: 8px;
            color: #ff4b44;
            text-align: center;
            margin-top: 3px;
        }

        .logo-label {
            font-size: 0.6rem;
            color: #FFD700;
            margin-top: 4px;
            text-align: center;
        }

        /* Ссылка на Telegram (кнопка) */
        .telegram-link-top {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #0088cc 0%, #006699 100%);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid #FFD700;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .telegram-link-top:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #0099dd 0%, #0077aa 100%);
        }

        /* Заголовок по центру */
        .title-section {
            flex: 1;
            text-align: center;
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: normal;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .sub {
            color: #000000;
            margin: 5px 0 0 0;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Таблица */
        .prediction-table {
            background: linear-gradient(to bottom, #fef9e6 0%, #fff5e0 100%);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 2px solid #FFD700;
        }

        .table-header {
            display: grid;
            grid-template-columns: 70px 1fr 60px;
            background: linear-gradient(135deg, #ff4b44 0%, #d9403a 100%);
            color: #ffffff;
            padding: 15px 20px;
            font-weight: bold;
            border-bottom: 3px solid #FFD700;
            font-size: 1.1rem;
            font-family: monospace;
        }

        .header-pos { text-align: center; }
        .header-team { padding-left: 15px; }
        .header-move { text-align: center; }

        .teams-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .team-item {
            background: white;
            margin: 0;
            padding: 12px 20px;
            border-bottom: 1px solid #e6d5b3;
            display: grid;
            grid-template-columns: 70px 1fr 60px;
            align-items: center;
            cursor: grab;
            transition: all 0.15s ease;
        }

        .team-item:hover {
            background: #fff8ed;
            transform: translateX(3px);
        }

        .team-item:active {
            cursor: grabbing;
        }

        .team-item.dragging {
            opacity: 0.3;
            cursor: grabbing;
        }

        .drag-over {
            border-top: 4px solid #FFD700;
            background: #fff3df;
        }

        .team-position {
            font-weight: 800;
            font-size: 1.4rem;
            text-align: center;
            color: #C49A2B;
            font-family: monospace;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.05);
        }

        .team-name {
            font-weight: 600;
            font-size: 1rem;
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-badge {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,215,0,0.5);
        }

        .drag-handle {
            text-align: center;
            color: #C49A2B;
            font-size: 1.8rem;
            cursor: grab;
            transition: 0.1s;
            font-weight: bold;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        /* Стили для логотипов команд */
        .team-badge-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            display: block;
        }
        
        .team-badge-fallback {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,215,0,0.5);
        }

        .buttons-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            color: #1B2F4F;
            box-shadow: 0 5px 0 #B57C1C;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B57C1C;
        }

        .reset-btn {
            background: linear-gradient(135deg, #e9c46a 0%, #d4a373 100%);
            color: #2c3e50;
        }

        .save-png-btn {
            background: linear-gradient(135deg, #2a9d8f 0%, #1e6b60 100%);
            color: white;
            box-shadow: 0 5px 0 #145c52;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 10px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #FFD966;
            border: 1px solid #FFD700;
	}

	.home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #6c5ce7 0%, #5a4ace 100%);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid #FFD700;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .home-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #7d6ef5 0%, #6b5bdf 100%);
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            padding: 8px;
            color: #FFD966;
            opacity: 0.8;
        }

        @media (max-width: 750px) {
            .top-bar {
                flex-direction: column;
                align-items: center;
            }
            .title-section {
                order: -1;
            }
            .tg-group {
                justify-content: center;
            }
            .team-name {
                font-size: 0.8rem;
                padding-left: 5px;
            }
            .team-position {
                font-size: 1.1rem;
            }
            .table-header {
                font-size: 0.85rem;
                grid-template-columns: 55px 1fr 50px;
                padding: 10px;
            }
            .team-item {
                grid-template-columns: 55px 1fr 50px;
                padding: 8px 10px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .logo-img {
                max-height: 40px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
    <div class="top-bar">
        <!-- СЛЕВА: ЛОГОТИП ЛА ЛИГИ -->
        <div class="logo-laliga">
            <div class="logo-container">
                <div class="logo-placeholder">
                    <img src="laliga.png" alt="La Liga Logo" class="logo-img" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="logo-error">⚠️ Лого Ла Лиги</div>
                </div>
            </div>
        </div>

        <!-- ЦЕНТР: ЗАГОЛОВОК -->
        <div class="title-section">
            <h1>⚡ LA LIGA PREDICTOR 2026/27 </h1>
            <div class="sub">Сделай свой прогноз финальной таблицы — сохрани результат в PNG</div>
        </div>

        <!-- СПРАВА: ЛОГОТИП КАНАЛА + КНОПКА TELEGRAM ВМЕСТЕ -->
                <div class="tg-group">
            <!-- КНОПКА НА ГЛАВНУЮ -->
            <a href="index.html" class="home-btn">
                На главную
            </a>

            <!-- ЛОГОТИП TELEGRAM КАНАЛА -->
            <a href="https://t.me/ваш_канал" target="_blank" class="logo-link" id="tgChannelLogoLink">
                <div class="logo-container">
                    <div class="logo-placeholder">
                        <img src="tg_channel_logo.png" alt="Telegram Channel Logo" class="logo-img"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <div class="logo-error">⚠️ Лого канала</div>
                    </div>
                </div>
            </a>

            <!-- КНОПКА TELEGRAM -->
            <a href="https://t.me/ваш_канал" target="_blank" class="telegram-link-top" id="telegramLinkBtn">
                Подписаться в тг
            </a>
        </div>
    </div>

    <!-- Таблица для прогноза -->
    <div id="tableToCapture" class="prediction-table">
        <div class="table-header">
            <div class="header-pos">#</div>
            <div class="header-team">КОМАНДА</div>
        </div>
        <div id="teamsContainer">
            <ul id="teamsList" class="teams-list"></ul>
        </div>
    </div>

    <div class="buttons-panel">
        <button class="reset-btn" id="resetBtn">⟳ Сбросить </button>
        <button class="save-png-btn" id="savePngBtn">Сохранить таблицу как PNG</button>
    </div>
    <div id="statusMessage" class="status"> Перетаскивай команды за ⋮⋮, потом нажми «Сохранить как PNG» </div>
    
    <footer>
        🏆 La Liga Predictor 2026/27 | Твой прогноз — твоя картинка
    </footer>
</div>

<script>
    const TEAMS_DATA = [
        "Реал Мадрид", "Барселона", "Атлетико Мадрид", "Атлетик Бильбао",
        "Реал Сосьедад", "Депортиво", "Вильярреал", "Реал Бетис", "Севилья",
        "Осасуна", "Сельта", "Валенсия", "Хетафе", "Райо Вальекано",
        "Лас-Пальмас", "Алавес", "Эспаньол", "Леванте", "Эльче", "Расинг"
    ];

    let currentOrder = [...TEAMS_DATA];
    let draggedItem = null;
    let draggedIndex = null;

    // Функция для получения цвета (оставлена для fallback)
    function getTeamColor(team) {
        const colors = {
            "Реал Мадрид": "#FFFFFF", "Барселона": "#A50044", "Атлетико Мадрид": "#E32636",
            "Атлетик Бильбао": "#E11A2C", "Реал Сосьедад": "#1F4FA1", "Депортиво": "#E0342B",
            "Вильярреал": "#FFD700", "Реал Бетис": "#1E7B3E", "Севилья": "#B8122F",
            "Осасуна": "#C60B1E", "Сельта": "#A3D1E6", "Валенсия": "#FF8C00",
            "Хетафе": "#0A7BBA", "Райо Вальекано": "#E01F29", "Лас-Пальмас": "#FFB81C",
            "Алавес": "#0055A4", "Эспаньол": "#2550A5", "Леванте": "#1A472A",
            "Эльче": "#720E11", "Расинг": "#ED1C24"
        };
        return colors[team] || "#6B4E3A";
    }

    // Функция для получения пути к логотипу команды
    function getTeamLogo(team) {
        const logos = {
            "Реал Мадрид": "real_madrid.png",
            "Барселона": "Barcelona.png",
            "Атлетико Мадрид": "atletico_madrid.png",
            "Атлетик Бильбао": "Athletic_Bilbao.png",
            "Реал Сосьедад": "Real_Sociedad.png",
            "Депортиво": "deportivo.png",
            "Вильярреал": "Villarreal.png",
            "Реал Бетис": "Real_Betis.png",
            "Севилья": "sevilla.png",
            "Осасуна": "osasuna.png",
            "Сельта": "Celta.png",
            "Валенсия": "valencia.png",
            "Хетафе": "getafe.png",
            "Райо Вальекано": "Rayo_Valleсano.png",
            "Лас-Пальмас": "Las_Palmas.png",
            "Алавес": "Alaves.png",
            "Эспаньол": "Espanyol.png",
            "Леванте": "Levante.png",
            "Эльче": "Elche.png",
            "Расинг": "Racing.png"
        };
        return logos[team] || "";
    }

    function renderList() {
        const container = document.getElementById('teamsList');
        if (!container) return;
        container.innerHTML = '';
        
        currentOrder.forEach((teamName, idx) => {
            const position = idx + 1;
            const li = document.createElement('li');
            li.className = 'team-item';
            li.setAttribute('draggable', 'true');
            li.setAttribute('data-index', idx);
            li.setAttribute('data-team', teamName);
            
            li.innerHTML = `
                <div class="team-position">${position}</div>
                <div class="team-name">
                    <img src="${getTeamLogo(teamName)}" alt="${teamName}" class="team-badge-img" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <span style="display: none;" class="team-badge-fallback" style="background: ${getTeamColor(teamName)}; width: 28px; height: 28px; border-radius: 50%; display: inline-block;"></span>
                    ${teamName}
                </div>
                <div class="drag-handle">⋮⋮</div>
            `;
            
            li.addEventListener('dragstart', handleDragStart);
            li.addEventListener('dragover', handleDragOver);
            li.addEventListener('dragleave', handleDragLeave);
            li.addEventListener('drop', handleDrop);
            li.addEventListener('dragend', handleDragEnd);
            
            container.appendChild(li);
        });
    }

    function handleDragStart(e) {
        const li = e.target.closest('.team-item');
        if (!li) { e.preventDefault(); return false; }
        draggedItem = li;
        draggedIndex = parseInt(li.getAttribute('data-index'));
        e.dataTransfer.setData('text/plain', draggedIndex.toString());
        e.dataTransfer.effectAllowed = 'move';
        li.classList.add('dragging');
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const targetLi = e.target.closest('.team-item');
        if (!targetLi || targetLi === draggedItem) return;
        document.querySelectorAll('.team-item').forEach(item => item.classList.remove('drag-over'));
        targetLi.classList.add('drag-over');
    }

    function handleDragLeave(e) {
        const targetLi = e.target.closest('.team-item');
        if (targetLi) targetLi.classList.remove('drag-over');
    }

    function handleDrop(e) {
        e.preventDefault();
        const targetLi = e.target.closest('.team-item');
        if (!targetLi || !draggedItem) { cleanupDrag(); return; }
        targetLi.classList.remove('drag-over');
        const targetIndex = parseInt(targetLi.getAttribute('data-index'));
        if (isNaN(targetIndex) || isNaN(draggedIndex) || draggedIndex === targetIndex) {
            cleanupDrag();
            return;
        }
        
        const newOrder = [...currentOrder];
        const [movedTeam] = newOrder.splice(draggedIndex, 1);
        newOrder.splice(targetIndex, 0, movedTeam);
        currentOrder = newOrder;
        renderList();
        
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = `✅ "${movedTeam}" на ${targetIndex+1} место!`;
        setTimeout(() => {
            if (statusDiv.innerHTML.includes("место!")) 
                statusDiv.innerHTML = '✨ Готово! Жми на камеру, чтобы сохранить прогноз ✨';
        }, 2500);
        cleanupDrag();
    }

    function handleDragEnd(e) { cleanupDrag(); }
    
    function cleanupDrag() {
        if (draggedItem) draggedItem.classList.remove('dragging');
        document.querySelectorAll('.team-item').forEach(item => item.classList.remove('drag-over'));
        draggedItem = null;
        draggedIndex = null;
    }

    function resetToRealOrder() {
        currentOrder = [...TEAMS_DATA];
        renderList();
        document.getElementById('statusMessage').innerHTML = '🔄 Сброшено к реальному порядку. Делай прогноз!';
        setTimeout(() => {
            document.getElementById('statusMessage').innerHTML = '✨ Перетаскивай команды и сохраняй в PNG ✨';
        }, 2000);
    }

    async function saveTableAsPNG() {
        const element = document.getElementById('tableToCapture');
        if (!element) return;
        
        const statusDiv = document.getElementById('statusMessage');
        const originalText = statusDiv.innerHTML;
        statusDiv.innerHTML = '⏳ Создаём PNG... ⏳';
        statusDiv.style.opacity = '0.7';
        
        try {
            const canvas = await html2canvas(element, {
                scale: 2.5,
                backgroundColor: '#fef9e6',
                logging: false,
                useCORS: true,
                allowTaint: false
            });
            
            const link = document.createElement('a');
            const date = new Date();
            const fileName = `laliga_predict_${date.getFullYear()}_${date.getMonth()+1}_${date.getDate()}.png`;
            link.download = fileName;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            statusDiv.innerHTML = '✅ PNG сохранён! ✅';
            statusDiv.style.opacity = '1';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes("PNG сохранён"))
                    statusDiv.innerHTML = originalText;
            }, 3000);
        } catch (error) {
            console.error('Ошибка:', error);
            statusDiv.innerHTML = '❌ Ошибка при создании PNG ❌';
            statusDiv.style.opacity = '1';
        }
    }

    function loadSavedPrediction() {
        const saved = localStorage.getItem('laliga_my_prediction');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.standings && parsed.standings.length === 20) {
                    currentOrder = parsed.standings;
                    renderList();
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    function autoSaveToLocal() {
        const prediction = {
            date: new Date().toISOString(),
            standings: currentOrder
        };
        localStorage.setItem('laliga_my_prediction', JSON.stringify(prediction));
    }

    const originalRender = renderList;
    window.renderList = function() {
        originalRender();
        autoSaveToLocal();
    };
    renderList = function() {
        originalRender();
        autoSaveToLocal();
    };
    
    function init() {
        if (!loadSavedPrediction()) {
            currentOrder = [...TEAMS_DATA];
            renderList();
        } else {
            renderList();
        }
        
        document.getElementById('resetBtn').addEventListener('click', resetToRealOrder);
        document.getElementById('savePngBtn').addEventListener('click', saveTableAsPNG);
        
        // НАСТРОЙ ССЫЛКИ НА TELEGRAM (ОДНА ССЫЛКА ДЛЯ ОБОИХ ЭЛЕМЕНТОВ)
        const tgLink = 'https://t.me/Is4Espana';
        
        const tgLogoLink = document.getElementById('tgChannelLogoLink');
        if (tgLogoLink) tgLogoLink.href = tgLink;
        
        const tgBtn = document.getElementById('telegramLinkBtn');
        if (tgBtn) tgBtn.href = tgLink;
        
        window.addEventListener('dragstart', (e) => {
            if (!e.target.closest('.team-item')) {
                e.preventDefault();
            }
        });
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
