<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Liga Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .team-item { background: white; padding: 10px; margin: 5px 0; display: flex; align-items: center; gap: 15px; cursor: grab; border: 1px solid #ddd; border-radius: 10px; }
        .team-position { font-weight: bold; width: 40px; text-align: center; font-size: 20px; }
        .team-name { flex: 1; display: flex; align-items: center; gap: 10px; }
        .drag-handle { cursor: grab; font-size: 20px; }
        .team-badge-img { width: 30px; height: 30px; }
        button { padding: 10px 20px; margin: 10px; background: gold; border: none; border-radius: 20px; cursor: pointer; }
        .status { margin-top: 20px; padding: 10px; background: #333; color: gold; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>
    <h1>LA LIGA PREDICTOR</h1>
    <div id="tableToCapture">
        <div id="teamsList"></div>
    </div>
    <button id="resetBtn">Сбросить</button>
    <button id="savePngBtn">Сохранить PNG</button>
    <div id="statusMessage" class="status">Перетаскивай команды за ⋮⋮</div>

<script>
const TEAMS = ["Реал Мадрид", "Барселона", "Атлетико Мадрид", "Атлетик Бильбао", "Реал Сосьедад", "Депортиво", "Вильярреал", "Реал Бетис", "Севилья", "Осасуна", "Сельта", "Валенсия", "Хетафе", "Райо Вальекано", "Лас-Пальмас", "Алавес", "Эспаньол", "Леванте", "Эльче", "Расинг"];

let currentOrder = [...TEAMS];
let draggedItem = null, draggedIndex = null;

function render() {
    const container = document.getElementById('teamsList');
    container.innerHTML = '';
    currentOrder.forEach((team, idx) => {
        const div = document.createElement('div');
        div.className = 'team-item';
        div.setAttribute('draggable', 'true');
        div.setAttribute('data-index', idx);
        div.innerHTML = '<div class="team-position">' + (idx+1) + '</div>' +
            '<div class="team-name"><img src="' + getLogo(team) + '" class="team-badge-img" onerror="this.style.display=\'none\'"> ' + team + '</div>' +
            '<div class="drag-handle">⋮⋮</div>';
        div.addEventListener('dragstart', handleDragStart);
        div.addEventListener('dragover', handleDragOver);
        div.addEventListener('drop', handleDrop);
        div.addEventListener('dragend', handleDragEnd);
        container.appendChild(div);
    });
}

function getLogo(team) {
    const logos = {
        "Реал Мадрид": "real_madrid.png", "Барселона": "Barcelona.png",
        "Атлетико Мадрид": "atletico_madrid.png", "Атлетик Бильбао": "Athletic_Bilbao.png",
        "Реал Сосьедад": "Real_Sociedad.png", "Депортиво": "deportivo.png",
        "Вильярреал": "Villarreal.png", "Реал Бетис": "Real_Betis.png",
        "Севилья": "sevilla.png", "Осасуна": "osasuna.png",
        "Сельта": "Celta.png", "Валенсия": "valencia.png",
        "Хетафе": "getafe.png", "Райо Вальекано": "Rayo_Vallecano.png",
        "Лас-Пальмас": "Las_Palmas.png", "Алавес": "Alaves.png",
        "Эспаньол": "Espanyol.png", "Леванте": "Levante.png",
        "Эльче": "Elche.png", "Расинг": "Racing.png"
    };
    return logos[team] || "";
}

function handleDragStart(e) {
    draggedItem = e.target.closest('.team-item');
    draggedIndex = parseInt(draggedItem.getAttribute('data-index'));
    e.dataTransfer.setData('text/plain', draggedIndex);
    e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }

function handleDrop(e) {
    e.preventDefault();
    const targetItem = e.target.closest('.team-item');
    if (!targetItem || !draggedItem) return;
    const targetIndex = parseInt(targetItem.getAttribute('data-index'));
    if (draggedIndex === targetIndex) return;
    const newOrder = [...currentOrder];
    const [moved] = newOrder.splice(draggedIndex, 1);
    newOrder.splice(targetIndex, 0, moved);
    currentOrder = newOrder;
    render();
    document.getElementById('statusMessage').innerHTML = '✅ ' + moved + ' на ' + (targetIndex+1) + ' место!';
    setTimeout(() => { document.getElementById('statusMessage').innerHTML = '✨ Перетаскивай команды ✨'; }, 2000);
}

function handleDragEnd() { draggedItem = null; draggedIndex = null; }

function reset() { currentOrder = [...TEAMS]; render(); document.getElementById('statusMessage').innerHTML = '🔄 Сброшено!'; }

async function savePNG() {
    const el = document.getElementById('tableToCapture');
    const status = document.getElementById('statusMessage');
    status.innerHTML = '⏳ Создаём PNG...';
    try {
        const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#fef9e6', useCORS: true });
        const link = document.createElement('a');
        link.download = 'laliga_predict.png';
        link.href = canvas.toDataURL();
        link.click();
        status.innerHTML = '✅ PNG сохранён!';
        setTimeout(() => status.innerHTML = '✨ Перетаскивай команды ✨', 3000);
    } catch(e) { status.innerHTML = '❌ Ошибка: ' + e.message; }
}

render();
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('savePngBtn').addEventListener('click', savePNG);
</script>
</body>
</html>
